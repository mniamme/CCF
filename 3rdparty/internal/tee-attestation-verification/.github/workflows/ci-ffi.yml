name: "FFI CI"

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-ffi-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  native:
    name: Native ${{ matrix.backend.name }} backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: OpenSSL
            features: crypto_openssl
          - name: pure-Rust
            features: crypto_pure_rust

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install rust
        run: |
          rustup update stable && rustup default stable

      - name: Build with ${{ matrix.backend.name }} backend
        run: cargo build --manifest-path ffi/Cargo.toml --no-default-features --features "${{ matrix.backend.features }}"

      - name: Test with ${{ matrix.backend.name }} backend
        run: cargo test --manifest-path ffi/Cargo.toml --no-default-features --features "${{ matrix.backend.features }}" -- --nocapture

  ffi-wasm-api:
    name: FFI WASM API consumer tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install rust
        run: |
          rustup update stable && rustup default stable

      - name: Setup WASM tooling
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --version 0.13.1 --locked

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26"

      - name: Build FFI WASM package for Node consumers
        working-directory: ffi
        run: wasm-pack build --target nodejs --out-dir ../target/wasm-consumer-tests/pkg --no-default-features --features "crypto_webcrypto"

      - name: Run FFI WASM API consumer tests
        run: node --test ffi/tests/wasm-consumer/*.test.cjs

  ffi-c-api:
    name: FFI C API consumer tests (${{ matrix.backend.name }}, ${{ matrix.link }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - name: OpenSSL
            features: crypto_openssl
          - name: pure-Rust
            features: crypto_pure_rust
        link:
          - shared
          - static

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install rust
        run: |
          rustup update stable && rustup default stable

      - name: Configure C consumer tests
        run: >
          cmake -S ffi/tests/c-consumer -B target/c-consumer-tests
          -DTAV_BACKEND_FEATURES=${{ matrix.backend.features }}
          -DTAV_LINK_STATIC=${{ matrix.link == 'static' && 'ON' || 'OFF' }}

      - name: Build C consumer tests
        run: cmake --build target/c-consumer-tests

      - name: Run C consumer tests
        run: ctest --test-dir target/c-consumer-tests --output-on-failure
