[package]
name = "tee-attestation-verification-caci"
version = "1.0.3"
edition = "2021"
rust-version = "1.77"
repository = "https://github.com/microsoft/TEE-Attestation-Verification"
keywords = ["confidentiality", "sev-snp"]
description = "ACI/UVM endorsement verification for TEE attestation verification"
authors = ["Chris Jensen"]
license = "MIT"

[package.metadata.docs.rs]
features = ["crypto_openssl", "crypto_webcrypto"]
targets = ["x86_64-unknown-linux-gnu", "wasm32-unknown-unknown"]

[features]
default = ["crypto/default", "attestation/default", "cose/default"]
crypto_openssl = [
    "crypto/crypto_openssl",
    "attestation/crypto_openssl",
    "cose/crypto_openssl",
]
crypto_pure_rust = [
    "crypto/crypto_pure_rust",
    "attestation/crypto_pure_rust",
    "cose/crypto_pure_rust",
]
crypto_webcrypto = [
    "crypto/crypto_webcrypto",
    "attestation/crypto_webcrypto",
    "cose/crypto_webcrypto",
]

[dependencies]
attestation = { package = "tee-attestation-verification-lib", version = "1.0.3", path = "../attestation", default-features = false }
cose = { package = "tee-attestation-verification-cose", version = "1.0.3", path = "../cose", default-features = false }
crypto = { package = "tee-attestation-verification-crypto", version = "1.0.3", path = "../crypto", default-features = false }
serde_json = "1"

[target.'cfg(not(target_family = "wasm"))'.dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[target.'cfg(target_family = "wasm")'.dev-dependencies]
wasm-bindgen-test = "0.3"
