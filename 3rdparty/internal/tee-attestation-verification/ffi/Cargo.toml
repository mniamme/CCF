[package]
name = "tee-attestation-verification-ffi"
version = "1.0.3"
edition = "2021"
rust-version = "1.77"
repository = "https://github.com/microsoft/TEE-Attestation-Verification"
keywords = ["confidentiality", "sev-snp", "tpm"]
description = "C and WebAssembly bindings for TEE attestation verification"
authors = ["Chris Jensen"]
license = "MIT"

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]

[features]
crypto_openssl = [
    "crypto/crypto_openssl",
    "attestation/crypto_openssl",
    "cose/crypto_openssl",
    "caci/crypto_openssl",
]
crypto_pure_rust = [
    "crypto/crypto_pure_rust",
    "attestation/crypto_pure_rust",
    "cose/crypto_pure_rust",
    "caci/crypto_pure_rust",
]
crypto_webcrypto = [
    "crypto/crypto_webcrypto",
    "attestation/crypto_webcrypto",
    "cose/crypto_webcrypto",
    "caci/crypto_webcrypto",
]

[dependencies]
attestation = { package = "tee-attestation-verification-lib", version = "1.0.3", path = "../attestation", default-features = false }
caci = { package = "tee-attestation-verification-caci", version = "1.0.3", path = "../caci", default-features = false }
cose = { package = "tee-attestation-verification-cose", version = "1.0.3", path = "../cose", default-features = false }
crypto = { package = "tee-attestation-verification-crypto", version = "1.0.3", path = "../crypto", default-features = false }
serde_json = "1"
zerocopy = { version = "0.8.31", features = ["derive"] }

[target.'cfg(target_family = "wasm")'.dependencies]
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
